name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared-schema/**'
      - 'packages/shared-domain/**'
      - 'apps/forge/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/shared-schema/**'
      - 'packages/shared-domain/**'
      - 'apps/forge/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter=@game-forge/shared-schema --filter=@game-forge/shared-domain

      - name: Lint shared packages
        run: npx turbo run lint --filter=@game-forge/shared-schema --filter=@game-forge/shared-domain

      - name: Build Angular app
        run: cd apps/forge && npx ng build

      - name: Test shared-domain
        run: cd packages/shared-domain && npm test
