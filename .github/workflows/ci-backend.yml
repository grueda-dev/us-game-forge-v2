name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - 'packages/py/forge-core/**'
      - 'apps/forge-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/py/forge-core/**'
      - 'apps/forge-api/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install forge-core
        run: cd packages/py/forge-core && uv venv && uv pip install -e ".[dev]"

      - name: Lint forge-core
        run: cd packages/py/forge-core && uv run ruff check src/

      - name: Type check forge-core
        run: cd packages/py/forge-core && uv run mypy src/

      - name: Test forge-core
        run: cd packages/py/forge-core && uv run pytest

      - name: Install forge-api
        run: cd apps/forge-api && uv venv && uv pip install -e ".[dev]"

      - name: Lint forge-api
        run: cd apps/forge-api && uv run ruff check src/
